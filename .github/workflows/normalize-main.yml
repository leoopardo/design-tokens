name: Normalize Tokens

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: normalize-main
  cancel-in-progress: true

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize tokens
        run: npm run normalize

      - name: Commit normalize changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tokens-normalized
          if git diff --cached --quiet; then
            git commit --allow-empty -m "chore(tokens): normalize"
          else
            git commit -m "chore(tokens): normalize"
          fi
          git push
