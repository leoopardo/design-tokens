name: Normalize Tokens

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: normalize-main
  cancel-in-progress: true

jobs:
  normalize:
    if: "${{ github.event.head_commit.message != 'chore(tokens): normalize' }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize tokens
        run: npm run normalize

      - name: Commit normalize changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tokens-normalized
          if git diff --cached --quiet; then
            echo "No normalized token changes to commit."
            exit 0
          fi
          git commit -m "chore(tokens): normalize"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed on attempt $i, retrying..."
          done
          echo "Failed to push normalize commit after 3 attempts."
          exit 1
