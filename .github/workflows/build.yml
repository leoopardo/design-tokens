name: Build Tokens

on:
  workflow_run:
    workflows:
      - Normalize Tokens
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: build-main
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build
