name: Build Tokens

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-main
  cancel-in-progress: true

jobs:
  build:
    if: "${{ contains(github.event.head_commit.message, 'chore(tokens): normalize') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build
