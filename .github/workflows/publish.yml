name: Publish Package

on:
  workflow_run:
    workflows:
      - Build Tokens
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          cache: npm

      - name: Ensure scoped package name
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const owner = (process.env.REPO_OWNER || '').toLowerCase();
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const current = pkg.name;

          if (!current.startsWith('@')) {
            pkg.name = `@${owner}/${current}`;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(`Adjusted package name: ${current} -> ${pkg.name}`);
          } else {
            console.log(`Package name already scoped: ${current}`);
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Set unique CI version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const base = pkg.version.split('-')[0];
          pkg.version = `${base}-main.${process.env.GITHUB_RUN_NUMBER}`;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log(`Publishing version ${pkg.version}`);
          NODE

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
