name: Publish Package

on:
  workflow_run:
    workflows:
      - Build Tokens
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          cache: npm

      - name: Ensure scoped package name
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const owner = (process.env.REPO_OWNER || '').toLowerCase();
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const current = pkg.name;

          if (!current.startsWith('@')) {
            pkg.name = `@${owner}/${current}`;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(`Adjusted package name: ${current} -> ${pkg.name}`);
          } else {
            console.log(`Package name already scoped: ${current}`);
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Set unique CI version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const base = pkg.version.split('-')[0];
          pkg.version = `${base}-main.${process.env.GITHUB_RUN_NUMBER}`;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log(`Publishing version ${pkg.version}`);
          NODE

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package metadata
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_ENV, `PACKAGE_NAME=${pkg.name}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `PACKAGE_VERSION=${pkg.version}\n`);
          NODE

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CUSTOM_MESSAGE: ${{ vars.SLACK_CUSTOM_MESSAGE }}
        run: |
          node <<'NODE'
          (async () => {
          const webhookUrl = process.env.SLACK_WEBHOOK_URL;
          if (!webhookUrl) {
            console.log('SLACK_WEBHOOK_URL not configured; skipping Slack notification.');
            return;
          }

          const custom = 'Nova versão de design-tokens publicada 🚀. Lembrem-se de manter os projetos atualizados!';
          const pkgName = process.env.PACKAGE_NAME;
          const pkgVersion = process.env.PACKAGE_VERSION;
          const repo = process.env.GITHUB_REPOSITORY;
          const runId = process.env.GITHUB_RUN_ID;
          const sha = (process.env.GITHUB_SHA || '').slice(0, 7);
          const packageUrl = `https://github.com/${repo}/pkgs/npm/${encodeURIComponent(pkgName)}`;
          const runUrl = `https://github.com/${repo}/actions/runs/${runId}`;

          const payload = {
            text: `${custom}\n• Pacote: ${pkgName}@${pkgVersion}\n• Commit: ${sha}\n• Package: ${packageUrl}\n• Workflow: ${runUrl}`
          };

          const res = await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!res.ok) {
            const text = await res.text();
            throw new Error(`Slack webhook failed (${res.status}): ${text}`);
          }
          console.log('Slack notification sent.');
          })().catch((err) => {
            console.error(err.message);
            process.exit(1);
          });
          NODE
